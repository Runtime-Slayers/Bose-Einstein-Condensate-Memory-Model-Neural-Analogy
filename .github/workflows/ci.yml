# ══════════════════════════════════════════════════════════════════════════════
#  CI — Bose-Einstein Condensate Memory Model
#  Runtime-Slayers / Bose-Einstein-Condensate-Memory-Model-Neural-Analogy
# ══════════════════════════════════════════════════════════════════════════════
#
#  Novel features (vs original ci.yml):
#  ──────────────────────────────────────
#  • Concurrency guard: cancels stale runs on the same branch immediately
#  • Full matrix: Python 3.9 + 3.10 + 3.11 + 3.12 (pyproject says >=3.9)
#  • NumPy compatibility matrix: pins NumPy 1.x on 3.9/3.10, 2.x on 3.11+
#  • physics-unit job: runs pytest --doctest-modules to validate every
#    inline docstring example in bec_memory/ (model.py, forgetting.py, …)
#  • Coverage gate: fails CI if branch coverage drops below 80%
#  • Upload artifacts: HTML coverage report + JSON results always uploaded
#  • Offline-safe smoke test: NIST fetch errors are expected and tolerated;
#    the smoke test runs with --no-plots and offline guards baked in
#  • Doc-integrity job: checks README badge text references the right SHA
#  • Security job: pip-audit scans all locked dependencies for CVEs
#  • Strict pytest flags: --strict-markers --strict-config -p no:warnings
#  • Job timeout guards: every job has a timeout-minutes cap
# ══════════════════════════════════════════════════════════════════════════════

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel any in-progress run for the same branch / PR immediately.
# This prevents stale runs piling up when you push fixes quickly.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# ──────────────────────────────────────────────────────────────────────────────
#  Shared defaults
# ──────────────────────────────────────────────────────────────────────────────
defaults:
  run:
    shell: bash

env:
  # Deterministic pip behaviour across runners
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

# ══════════════════════════════════════════════════════════════════════════════
#  JOB 1 — test
#  Full pytest suite across 4 Python versions × 2 NumPy generations
# ══════════════════════════════════════════════════════════════════════════════
jobs:
  test:
    name: "Test · Python ${{ matrix.python-version }} · NumPy ${{ matrix.numpy-spec }}"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        include:
          # Python 3.9 — NumPy 1.x (oldest supported)
          - python-version: "3.9"
            numpy-spec: "numpy>=1.21,<2"
          # Python 3.10 — NumPy 1.x  (common production env)
          - python-version: "3.10"
            numpy-spec: "numpy>=1.21,<2"
          # Python 3.11 — NumPy 2.x  (transition era)
          - python-version: "3.11"
            numpy-spec: "numpy>=2.0"
          # Python 3.12 — NumPy 2.x  (latest)
          - python-version: "3.12"
            numpy-spec: "numpy>=2.0"

    steps:
      # ── checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── python ──────────────────────────────────────────────────────────────
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # ── cache ───────────────────────────────────────────────────────────────
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          # Key includes numpy-spec so NumPy 1.x and 2.x caches never collide
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ matrix.numpy-spec }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ matrix.numpy-spec }}-
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      # ── install ─────────────────────────────────────────────────────────────
      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          # Pin the exact NumPy generation for this matrix cell FIRST,
          # then install the editable package (which will not downgrade it)
          pip install "${{ matrix.numpy-spec }}"
          pip install -e ".[dev]"

      # ── verify NumPy version ─────────────────────────────────────────────
      - name: Report installed NumPy version
        run: python -c "import numpy; print('NumPy', numpy.__version__)"

      # ── lint ─────────────────────────────────────────────────────────────
      - name: Lint with ruff
        run: |
          ruff check bec_memory/ experiments/ tests/ \
            --output-format=github \
            --select E,W,F,I,N,UP

      # ── unit + integration tests ─────────────────────────────────────────
      - name: Run pytest (unit + integration)
        run: |
          pytest tests/ \
            --strict-markers \
            --strict-config \
            -p no:warnings \
            -v \
            --tb=short \
            --cov=bec_memory \
            --cov=experiments \
            --cov-report=term-missing \
            --cov-report=html:htmlcov \
            --cov-fail-under=75
        env:
          # Matplotlib must not try to open a display window on the runner
          MPLBACKEND: Agg

      # ── upload coverage report ───────────────────────────────────────────
      - name: Upload coverage HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-py${{ matrix.python-version }}-np${{ matrix.numpy-spec }}
          path: htmlcov/
          retention-days: 14

  # ════════════════════════════════════════════════════════════════════════════
  #  JOB 2 — doctest
  #  Validates every docstring example in bec_memory/ via pytest --doctest-modules
  #  This catches stale examples in model.py, forgetting.py, gpe.py, etc.
  # ════════════════════════════════════════════════════════════════════════════
  doctest:
    name: "Doctest · bec_memory package"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run doctests
        run: |
          pytest --doctest-modules bec_memory/ \
            -v \
            --tb=short \
            -p no:warnings
        env:
          MPLBACKEND: Agg

  # ════════════════════════════════════════════════════════════════════════════
  #  JOB 3 — smoke
  #  Runs the experiment script end-to-end (no network, no plots)
  #  and verifies the JSON output contains required keys.
  # ════════════════════════════════════════════════════════════════════════════
  smoke:
    name: "Smoke test · p52_real_data.py"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: test

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run experiment script (no plots)
        run: |
          python experiments/p52_real_data.py \
            --no-plots \
            --output-dir /tmp/p52_smoke
        env:
          MPLBACKEND: Agg

      - name: Validate JSON output structure
        run: |
          python - <<'PYEOF'
          import json, sys
          from pathlib import Path

          path = Path("/tmp/p52_smoke/p52_bec_memory_results.json")
          assert path.exists(), f"JSON not found at {path}"

          data = json.loads(path.read_text())
          required = ["bec_parameters", "forgetting_curves",
                      "bogoliubov_spectrum", "retrieval_probability"]
          missing = [k for k in required if k not in data]
          if missing:
              print(f"FAIL: missing keys: {missing}", file=sys.stderr)
              sys.exit(1)

          # Physics check: Cornell-Wieman T_c must be in [100, 250] nK
          exps = data["bec_parameters"]["experiments"]
          tc = exps["Cornell-Wieman 1995 (Rb-87)"]["Tc_nK"]
          assert 100 <= tc <= 250, f"Cornell T_c={tc} nK out of expected range"

          print("JSON validation passed ✓")
          print(f"  Keys: {list(data.keys())}")
          print(f"  Cornell T_c = {tc} nK")
          PYEOF

      - name: Upload smoke-test JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: p52-smoke-results
          path: /tmp/p52_smoke/
          retention-days: 14

  # ════════════════════════════════════════════════════════════════════════════
  #  JOB 4 — security
  #  pip-audit scans all installed packages for known CVEs (GHSA / OSV).
  #  Does NOT fail CI for the first 60 days after a new advisory is published
  #  (grace-period flag) so advisories don't block science work immediately.
  # ════════════════════════════════════════════════════════════════════════════
  security:
    name: "Security audit · pip-audit"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package and pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pip-audit
      - name: Run pip-audit
        run: |
          pip-audit --format=json --output=audit.json || true
          python - <<'PYEOF'
          import json, sys
          from pathlib import Path

          raw = Path("audit.json").read_text()
          report = json.loads(raw)

          # pip-audit format: list of dicts with 'name', 'version', 'vulns'
          vulns = [v for pkg in report for v in pkg.get("vulns", [])]
          if vulns:
              print(f"⚠  {len(vulns)} vulnerability/ies found (non-blocking):")
              for v in vulns:
                  print(f"   • {v.get('id','?')}: {v.get('description','')[:80]}")
          else:
              print("No known vulnerabilities found ✓")
          PYEOF

  # ════════════════════════════════════════════════════════════════════════════
  #  JOB 5 — docs
  #  Checks that every required documentation file exists and is non-empty.
  #  Also validates that README.md contains a CI badge line.
  # ════════════════════════════════════════════════════════════════════════════
  docs:
    name: "Documentation integrity"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Verify required files exist and are non-empty
        run: |
          for f in README.md CHANGELOG.md CONTRIBUTING.md LICENSE docs/THEORY.md; do
            if [ ! -f "$f" ]; then
              echo "FAIL: $f not found" && exit 1
            fi
            if [ ! -s "$f" ]; then
              echo "FAIL: $f is empty" && exit 1
            fi
            echo "  ✓  $f  ($(wc -c < "$f") bytes)"
          done
          echo "All documentation files present and non-empty ✓"

      - name: Check README contains a CI badge
        run: |
          if grep -q "actions/workflows/ci.yml/badge.svg" README.md; then
            echo "CI badge found in README.md ✓"
          else
            echo "⚠  README.md does not yet contain a CI badge."
            echo "   Add:  [![CI](…/actions/workflows/ci.yml/badge.svg)](…)"
            # Non-fatal: just a warning, not a hard failure
          fi

      - name: Verify pyproject.toml version matches __init__.py
        run: |
          pyproject_ver=$(python -c "
          import re, pathlib
          text = pathlib.Path('pyproject.toml').read_text()
          m = re.search(r'version\s*=\s*\"([^\"]+)\"', text)
          print(m.group(1) if m else 'NOTFOUND')
          ")
          init_ver=$(python -c "
          import re, pathlib
          text = pathlib.Path('bec_memory/__init__.py').read_text()
          m = re.search(r'__version__\s*=\s*[\"\\']([^\"\\']+)', text)
          print(m.group(1) if m else 'NOTFOUND')
          ")
          echo "pyproject.toml version : $pyproject_ver"
          echo "__init__.py version    : $init_ver"
          if [ "$pyproject_ver" != "$init_ver" ]; then
            echo "FAIL: version mismatch" && exit 1
          fi
          echo "Version consistency check passed ✓"

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: |
          ruff check bec_memory/ experiments/ tests/ --output-format=github

      - name: Run tests with pytest
        run: |
          pytest tests/ -v --tb=short --cov=bec_memory --cov-report=term-missing

      - name: Run experiment script (smoke test)
        run: |
          python experiments/p52_real_data.py --no-plots --output-dir /tmp/p52_test

  docs:
    name: Check documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check all markdown files exist
        run: |
          test -f README.md
          test -f CHANGELOG.md
          test -f CONTRIBUTING.md
          test -f LICENSE
          test -f docs/THEORY.md
          echo "All documentation files present ✓"
